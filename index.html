<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shashka Arena</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 400px; margin: auto; }
        .user-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #1e293b; margin-bottom: 8px; border-radius: 10px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .lvl { font-size: 11px; color: #94a3b8; }
        .btn-invite { background: #22c55e; border: none; padding: 6px 12px; color: white; border-radius: 6px; cursor: pointer; }
        h2 { text-align: center; color: #a78bfa; }
    </style>
</head>
<body>
<div class="container">
    <h2>Abdurahmon Tog'ajon</h2>
    <div id="online-users"></div>
</div>

<script>
    const players = [
        "Jasurbek", "Dilshod", "Azamat", "Bekzod", "Umidjon", "Otabek", "Sardor", "Sherzod",
        "Nuriddin", "Firdavs", "Muhammad", "Rustam", "Islom", "Bobur", "Kamron", "Shoxrux",
        "Zafar", "Sanjar", "Akmal", "Qobiljon Yalpak"
    ];

    function renderUsers() {
        const list = document.getElementById('online-users');
        players.forEach(name => {
            const level = Math.floor(Math.random() * 20) + 1; // Tasodifiy daraja
            list.innerHTML += `
                <div class="user-item">
                    <div class="user-info">
                        <div class="avatar">${name[0]}</div>
                        <div>
                            <div>${name}</div>
                            <div class="lvl">Daraja: ${level}</div>
                        </div>
                    </div>
                    <button class="btn-invite" onclick="alert('${name} bilan o\'yin so\'rovi yuborildi!')">Taklif</button>
                </div>`;
        });
    }

    // Har 24 soatda xabar (Test uchun 1 daqiqa qilib qo'yildi)
    setInterval(() => {
        const randomPlayer = players[Math.floor(Math.random() * players.length)];
        alert(randomPlayer + " sizga yozdi: 'Kel birga shashka o'ynab dam olamiz?'");
    }, 60000); 

    renderUsers();
</script>
</body>
</html>
